apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: filebeat
  namespace: elastic-system
spec:
  type: filebeat
  version: 9.1.2

  config:
    filebeat.inputs:
      - type: filestream
        id: kubernetes-container-logs
        paths:
          - /var/log/containers/*.log

    processors:
      - add_host_metadata: {}
      - add_cloud_metadata: {}
      - add_kubernetes_metadata:
          host: ${NODE_NAME}
          matchers:
            - logs_path:
                logs_path: "/var/log/containers/"

    output.logstash:
      hosts:
        - logstash-ls-beats.elastic-system.svc.cluster.local:5044

  daemonSet:
    podTemplate:
      spec:
        serviceAccountName: filebeat
        automountServiceAccountToken: true

        dnsPolicy: ClusterFirstWithHostNet

        hostNetwork: true

        containers:
          - name: filebeat
            securityContext:
              runAsUser: 0

            env:
              - name: NODE_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName

            volumeMounts:
              - name: varlogcontainers
                mountPath: /var/log/containers
                readOnly: true

              - name: varlogpods
                mountPath: /var/log/pods
                readOnly: true

              - name: dockercontainers
                mountPath: /var/lib/docker/containers
                readOnly: true

        volumes:
          - name: varlogcontainers
            hostPath:
              path: /var/log/containers

          - name: varlogpods
            hostPath:
              path: /var/log/pods

          - name: dockercontainers
            hostPath:
              path: /var/lib/docker/containers