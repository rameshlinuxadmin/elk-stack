apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: envoy-gateway

helmCharts:
  - name: gateway-helm
    repo: oci://docker.io/envoyproxy/
    version: v1.8.2
    releaseName: envoy-gateway
    namespace: envoy-gateway
    valuesFile: values.yaml
  
resources:
  - namespace.yaml
  - gatewayclass.yaml
  - internal-gateway.yaml
